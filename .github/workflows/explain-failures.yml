name: Explain test failures

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  explain:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download failure logs
        uses: actions/github-script@v7
        id: get-logs
        with:
          script: |
            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });
            const failed = jobs.data.jobs
              .filter(j => j.conclusion === 'failure')
              .map(j => j.name)
              .join(', ');
            core.setOutput('failed-jobs', failed || 'unknown');

      - name: Explain failure
        uses: Bsel153/errex@main
        with:
          error-text: "CI jobs failed: ${{ steps.get-logs.outputs.failed-jobs }}"
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          brief: 'true'
          post-comment: 'false'
        id: errex

      - name: Print explanation
        run: echo "${{ steps.errex.outputs.explanation }}"
