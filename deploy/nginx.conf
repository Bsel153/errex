# Nginx reverse proxy for errex
# Place in /etc/nginx/sites-available/errex and symlink to sites-enabled/
#
# With Let's Encrypt TLS (recommended for public access):
#   certbot --nginx -d errex.yourdomain.com
#
# Then update server_name and the certbot-managed ssl blocks below.

server {
    listen 80;
    server_name errex.yourdomain.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name errex.yourdomain.com;

    # Replace with your actual cert paths (or let certbot manage these)
    ssl_certificate     /etc/letsencrypt/live/errex.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/errex.yourdomain.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # SSE (streaming) needs these — do not buffer the explain endpoint
    location /explain {
        proxy_pass         http://127.0.0.1:7337;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    location / {
        proxy_pass         http://127.0.0.1:7337;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
